<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0a0e1a"/>
  <text x="400" y="30" fill="#0070f3" font-size="16" text-anchor="middle" font-family="monospace">WebWaka AI Platform — Architecture</text>
  <!-- Vertical Repos -->
  <rect x="20" y="60" width="160" height="50" rx="8" fill="#1a2040" stroke="#0070f3"/>
  <text x="100" y="90" fill="#fff" font-size="12" text-anchor="middle" font-family="monospace">Vertical Repos</text>
  <!-- Arrow down -->
  <line x1="100" y1="110" x2="100" y2="150" stroke="#0070f3" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="100" y="145" fill="#aaa" font-size="10" text-anchor="middle" font-family="monospace">@webwaka/core AI</text>
  <!-- AI Platform -->
  <rect x="20" y="160" width="760" height="60" rx="8" fill="#1a3060" stroke="#0070f3"/>
  <text x="400" y="195" fill="#0070f3" font-size="14" text-anchor="middle" font-family="monospace">webwaka-ai-platform (Cloudflare Worker)</text>
  <text x="400" y="212" fill="#aaa" font-size="10" text-anchor="middle" font-family="monospace">JWT Validate → Entitlement Check → BYOK Resolve → Route → Emit billing event</text>
  <!-- OpenRouter -->
  <rect x="20" y="260" width="200" height="50" rx="8" fill="#1a2040" stroke="#00b4d8"/>
  <text x="120" y="290" fill="#fff" font-size="12" text-anchor="middle" font-family="monospace">OpenRouter</text>
  <!-- Cloudflare AI -->
  <rect x="240" y="260" width="200" height="50" rx="8" fill="#1a2040" stroke="#00b4d8"/>
  <text x="340" y="290" fill="#fff" font-size="12" text-anchor="middle" font-family="monospace">Cloudflare AI</text>
  <!-- Central Mgmt -->
  <rect x="460" y="260" width="320" height="50" rx="8" fill="#1a2040" stroke="#f59e0b"/>
  <text x="620" y="290" fill="#fff" font-size="12" text-anchor="middle" font-family="monospace">webwaka-central-mgmt (billing events)</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0070f3"/>
    </marker>
  </defs>
</svg>
